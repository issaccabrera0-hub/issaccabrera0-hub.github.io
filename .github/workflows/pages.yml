name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          ADC7FA: ${{ secrets.ADC7FA }}
          B5C554: ${{ secrets.B5C554 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('ADC7FA', '')
          tag_b = os.environ.get('B5C554', '')
          n = 0
          for fpath in pathlib.Path('_site').rglob('*.html'):
              try:
                  orig = fpath.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              updated = orig
              if tag_a:
                  updated = updated.replace('<!-- a61f70f0ba8c729e5a5ee56bb76bdf -->', tag_a)
              if tag_b:
                  updated = updated.replace('<!-- 9fbb68abea64e629f31e90ff -->', tag_b)
              if updated != orig:
                  fpath.write_text(updated, encoding='utf-8')
                  n += 1
          if n == 0 and (tag_a or tag_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
